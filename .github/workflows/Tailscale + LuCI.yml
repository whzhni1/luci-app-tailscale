name: "构建 Tailscale + LuCI"

on:
  workflow_dispatch:
    inputs:
      enable_compression:
        description: '启用 UPX 压缩'
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.tailscale.outputs.version }}
      skip:         ${{ steps.tailscale.outputs.skip }}
      luci_version: ${{ steps.luci.outputs.version }}
      build_time:   ${{ steps.time.outputs.time }}
      sha:          ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: "检查 Tailscale 更新"
        id: tailscale
        run: |
          LATEST=$(curl -s https://api.github.com/repos/tailscale/tailscale/releases/latest \
            | jq -r .tag_name | sed 's/^v//')
          CURRENT=$(sed -n 's/^PKG_VERSION:=//p' tailscale/Makefile)
          echo "version=v$LATEST" >> $GITHUB_OUTPUT
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            HASH=$(curl -sL "https://codeload.github.com/tailscale/tailscale/tar.gz/v${LATEST}" \
              | sha256sum | cut -d' ' -f1)
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$LATEST/; s/^PKG_HASH:=.*/PKG_HASH:=$HASH/" tailscale/Makefile
          fi

      - name: "推送"
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "tailscale: update to $(sed -n 's/^PKG_VERSION:=//p' tailscale/Makefile)" || true
          git push || true
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: "获取 LuCI 版本"
        id: luci
        run: |
          echo "version=$(grep -E '^PKG_VERSION:=' luci-app-tailscale/Makefile | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: "生成构建时间"
        id: time
        run: echo "time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

  build:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    name: "${{ matrix.arch }}-${{ matrix.sdk }}"
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
        sdk:
          - openwrt-25.12
          - openwrt-24.10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-version.outputs.sha }}

      - name: "注入 UPX"
        if: >
          (github.event_name == 'schedule' || inputs.enable_compression == true) &&
          !contains('mips64_mips64r2 mips64_octeonplus mips64el_mips64r2', matrix.arch)
        run: |
          sed -i '/GO_PKG_BUILD_BIN_DIR.*tailscaled/a \\t/usr/bin/upx --lzma --best $(1)\/usr\/sbin\/tailscaled || true' tailscale/Makefile
          echo "=== 注入后的 install 段 ==="
          sed -n '/define Package\/tailscale\/install/,/^endef/p' tailscale/Makefile
          
      - name: "编译"
        id: build
        continue-on-error: true
        uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-tailscale
          NO_REFRESH_CHECK: true

      - name: "整理并发布"
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p out

          echo "=== 产出文件 ==="
          find bin/packages/${{ matrix.arch }}/packages_ci/ -type f | sort

          find bin/packages/${{ matrix.arch }}/packages_ci/ \
            \( -name "*.apk" -o -name "*.ipk" \) \
            ! -name "*-dbgsym*" ! -name "*_dbgsym*" | \
          while read PKG; do
            BASENAME=$(basename "$PKG")
            EXT="${BASENAME##*.}"

            if [ "$EXT" = "ipk" ]; then
              if echo "$BASENAME" | grep -q "^tailscale_"; then
                cp "$PKG" "out/${BASENAME}"
                echo "准备发布: out/${BASENAME}"
              elif [ "${{ matrix.arch }}" = "x86_64" ]; then
                cp "$PKG" "out/${BASENAME}"
                echo "准备发布: out/${BASENAME}"
              fi
            elif [ "$EXT" = "apk" ]; then
              if echo "$BASENAME" | grep -q "^tailscale-"; then
                NAME="${BASENAME%.*}_${{ matrix.arch }}.${EXT}"
                cp "$PKG" "out/${NAME}"
                echo "准备发布: out/${NAME}"
              elif
                cp "$PKG" "out/${BASENAME}"
                echo "准备发布: out/${BASENAME}"
              fi
            fi
          done

          [ -n "$(ls -A out/)" ] || { echo "没有找到任何包文件" && exit 1; }
          
      - name: "发布"
        if: steps.build.outcome == 'success'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check-version.outputs.version }}
          name: "Tailscale ${{ needs.check-version.outputs.version }} + LuCI ${{ needs.check-version.outputs.luci_version }}"
          body: |
            | 组件 | 版本 |
            |------|------|
            | Tailscale | ${{ needs.check-version.outputs.version }} |
            | LuCI | ${{ needs.check-version.outputs.luci_version }} |
            | 构建时间 | ${{ needs.check-version.outputs.build_time }} CST |
            📖 **安装说明请查看 [README](https://github.com/${{ github.repository }}#readme)**
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "out/*"

  report:
    needs: [check-version, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "报告"
        run: |
          if [ "${{ needs.check-version.outputs.skip }}" = "true" ]; then
            echo "# ⏭️ 跳过（版本相同: ${{ needs.check-version.outputs.version }}）" >> $GITHUB_STEP_SUMMARY
          else
            cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🎯 构建报告
          | 组件 | 版本 | 状态 |
          |------|------|------|
          | Tailscale + LuCI | ${{ needs.check-version.outputs.version }} | ${{ needs.build.result == 'success' && '✅' || '❌' }} |
          **时间:** ${{ needs.check-version.outputs.build_time }} CST
          EOF
          fi
