name: "构建 Tailscale + LuCI"

on:
  workflow_dispatch:
    inputs:
      enable_compression:
        description: '启用 UPX 压缩'
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.tailscale.outputs.version }}
      skip:         ${{ steps.tailscale.outputs.skip }}
      luci_version: ${{ steps.luci.outputs.version }}
      build_time:   ${{ steps.time.outputs.time }}
      sha:          ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: "检查 Tailscale 更新"
        id: tailscale
        run: |
          LATEST=$(curl -s https://api.github.com/repos/tailscale/tailscale/releases/latest \
            | jq -r .tag_name | sed 's/^v//')
          CURRENT=$(sed -n 's/^PKG_VERSION:=//p' tailscale/Makefile)
          echo "version=v$LATEST" >> $GITHUB_OUTPUT
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            HASH=$(curl -sL "https://codeload.github.com/tailscale/tailscale/tar.gz/v${LATEST}" \
              | sha256sum | cut -d' ' -f1)
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$LATEST/; s/^PKG_HASH:=.*/PKG_HASH:=$HASH/" tailscale/Makefile
          fi

      - name: "推送"
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "tailscale: update to $(sed -n 's/^PKG_VERSION:=//p' tailscale/Makefile)" || true
          git push || true
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: "获取 LuCI 版本"
        id: luci
        run: |
          echo "version=$(grep -E '^PKG_VERSION:=' luci-app-tailscale/Makefile | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: "生成构建时间"
        id: time
        run: echo "time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

  build-tailscale:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    name: "tailscale-${{ matrix.arch }}-${{ matrix.sdk }}"
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
        sdk:
          - SNAPSHOT
          - openwrt-24.10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-version.outputs.sha }}

      - name: "注入 UPX"
        if: >
          (github.event_name == 'schedule' || inputs.enable_compression == true) &&
          !contains('mips64_mips64r2 mips64_octeonplus mips64el_mips64r2', matrix.arch)
        run: |
          sed -i '/tailscale.init/a \\t/usr/bin/upx --lzma --best $(1)\/usr\/sbin\/tailscaled || true' tailscale/Makefile

      - name: "编译"
        id: build
        continue-on-error: true
        uses: sbwml/openwrt-gh-action-sdk@go1.25
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: tailscale
          NO_REFRESH_CHECK: true

      - name: "重命名"
        if: steps.build.outcome == 'success'
        id: rename
        run: |
          PKG=$(find bin/packages/${{ matrix.arch }}/packages_ci/ \
            \( -name "tailscale_*.apk" -o -name "tailscale_*.ipk" \) \
            ! -name "*-dbgsym*" | head -1)
          if [ -z "$PKG" ]; then
            echo "未找到包文件" && exit 1
          fi
          EXT="${PKG##*.}"
          VERSION=$(echo "${{ needs.check-version.outputs.version }}" | sed 's/^v//')
          DEST="tailscale_${VERSION}_${{ matrix.arch }}_${{ matrix.sdk }}.${EXT}"
          cp "$PKG" "$DEST"
          echo "file=$DEST" >> $GITHUB_OUTPUT

      - name: "发布"
        if: steps.rename.outcome == 'success'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check-version.outputs.version }}
          name: "Tailscale ${{ needs.check-version.outputs.version }} + LuCI ${{ needs.check-version.outputs.luci_version }}"
          body: |
            | 组件 | 版本 |
            |------|------|
            | Tailscale | ${{ needs.check-version.outputs.version }} |
            | LuCI | ${{ needs.check-version.outputs.luci_version }} |
            | 构建时间 | ${{ needs.check-version.outputs.build_time }} CST |
            📖 **安装说明请查看 [README](https://github.com/${{ github.repository }}#readme)**
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "${{ steps.rename.outputs.file }}"

  build-luci:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    name: "luci-${{ matrix.sdk }}"
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - SNAPSHOT
          - openwrt-24.10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-version.outputs.sha }}

      - name: "准备"
        run: |
          rm -rf tailscale/
          sed -i 's/+tailscale//g' luci-app-tailscale/Makefile

      - name: "编译"
        id: build
        continue-on-error: true
        uses: sbwml/openwrt-gh-action-sdk@go1.25
        env:
          ARCH: x86_64-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-tailscale
          NO_REFRESH_CHECK: true

      - name: "重命名"
        if: steps.build.outcome == 'success'
        id: rename
        run: |
          mkdir -p luci-out
          find bin/packages/x86_64/packages_ci/ \
            \( -name "*luci*tailscale*.apk" -o -name "*luci*tailscale*.ipk" \) \
            ! -name "*-dbgsym*" | \
          while read PKG; do
            BASENAME=$(basename "$PKG")
            EXT="${BASENAME##*.}"
            NAME="${BASENAME%.*}_${{ matrix.sdk }}.${EXT}"
            cp "$PKG" "luci-out/${NAME}"
          done
          [ -n "$(ls -A luci-out/)" ] || exit 1

      - name: "发布"
        if: steps.rename.outcome == 'success'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check-version.outputs.version }}
          name: "Tailscale ${{ needs.check-version.outputs.version }} + LuCI ${{ needs.check-version.outputs.luci_version }}"
          body: |
            | 组件 | 版本 |
            |------|------|
            | Tailscale | ${{ needs.check-version.outputs.version }} |
            | LuCI | ${{ needs.check-version.outputs.luci_version }} |
            | 构建时间 | ${{ needs.check-version.outputs.build_time }} CST |
            📖 **安装说明请查看 [README](https://github.com/${{ github.repository }}#readme)**
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "luci-out/*"

  report:
    needs: [check-version, build-tailscale, build-luci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "报告"
        run: |
          if [ "${{ needs.check-version.outputs.skip }}" = "true" ]; then
            echo "# ⏭️ 跳过（版本相同: ${{ needs.check-version.outputs.version }}）" >> $GITHUB_STEP_SUMMARY
          else
            cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🎯 构建报告
          | 组件 | 版本 | 状态 |
          |------|------|------|
          | Tailscale | ${{ needs.check-version.outputs.version }} | ${{ needs.build-tailscale.result == 'success' && '✅' || '❌' }} |
          | LuCI | ${{ needs.check-version.outputs.luci_version }} | ${{ needs.build-luci.result == 'success' && '✅' || '❌' }} |
          **时间:** ${{ needs.check-version.outputs.build_time }} CST
          EOF
          fi
