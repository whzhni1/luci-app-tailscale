name: "构建 Tailscale + LuCI"

on:
  workflow_dispatch:
    inputs:
      enable_compression:
        description: '启用 UPX 压缩'
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

env:
  TAILSCALE_REPO: "tailscale/tailscale"
  ENABLE_COMPRESSION: ${{ github.event_name == 'schedule' || inputs.enable_compression == true }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.tailscale.outputs.version }}
      skip:         ${{ steps.tailscale.outputs.skip }}
      luci_version: ${{ steps.luci.outputs.version }}
      build_time:   ${{ steps.time.outputs.time }}
    steps:
      - uses: actions/checkout@v4

      - name: "检查 Tailscale 更新"
        id: tailscale
        run: |
          LATEST=$(curl -s https://api.github.com/repos/tailscale/tailscale/releases/latest \
            | jq -r .tag_name | sed 's/^v//')
          CURRENT=$(sed -n 's/^PKG_VERSION:=//p' tailscale/Makefile)
          echo "version=v$LATEST" >> $GITHUB_OUTPUT
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            HASH=$(curl -sL "https://codeload.github.com/tailscale/tailscale/tar.gz/v${LATEST}" \
              | sha256sum | cut -d' ' -f1)
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$LATEST/; s/^PKG_HASH:=.*/PKG_HASH:=$HASH/" tailscale/Makefile
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "tailscale: update to $LATEST" || true
            git push || true
          fi

      - name: "获取 LuCI 版本"
        id: luci
        run: |
          echo "version=$(grep -E '^PKG_VERSION:=' luci-app-tailscale/Makefile | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: "生成构建时间"
        id: time
        run: echo "time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

  setup-upx:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false' && (github.event_name == 'schedule' || inputs.enable_compression == true)
    runs-on: ubuntu-latest
    outputs:
      upx_version: ${{ steps.upx.outputs.version }}
    steps:
      - name: "获取 UPX 最新版本号"
        id: upx
        run: |
          VER=$(curl -s https://api.github.com/repos/upx/upx/releases/latest | jq -r .tag_name)
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: "缓存 UPX"
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/upx/upx
          key: upx-${{ steps.upx.outputs.version }}-amd64-linux

      - name: "下载并解压 UPX（缓存未命中时）"
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER=${{ steps.upx.outputs.version }}
          mkdir -p /tmp/upx
          wget -q "https://github.com/upx/upx/releases/download/${VER}/upx-${VER#v}-amd64_linux.tar.xz"
          tar -xf upx-*.tar.xz
          mv upx-*/upx /tmp/upx/upx

  build-tailscale:
    needs: [check-version, setup-upx]
    if: |
      needs.check-version.outputs.skip == 'false' &&
      (needs.setup-upx.result == 'success' || needs.setup-upx.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: arm
            goarch: arm
            targets: arm_arm1176jzf-s_vfp,arm_arm926ej-s,arm_cortex-a15_neon-vfpv4,arm_cortex-a5_vfpv4,arm_cortex-a7,arm_cortex-a7_neon-vfpv4,arm_cortex-a7_vfpv4,arm_cortex-a8_vfpv3,arm_cortex-a9,arm_cortex-a9_neon,arm_cortex-a9_vfpv3-d16,arm_fa526,arm_xscale,arm_mpcore
          - id: arm64
            goarch: arm64
            targets: aarch64_cortex-a53,aarch64_cortex-a72,aarch64_cortex-a76,aarch64_generic
          - id: mips
            goarch: mips
            gomips: softfloat
            targets: mips_24kc,mips_4kec,mips_mips32
          - id: mipsle
            goarch: mipsle
            gomips: softfloat
            targets: mipsel_24kc,mipsel_24kc_24kf,mipsel_74kc,mipsel_mips32
          - id: mips64
            goarch: mips64
            gomips: softfloat
            upx_skip: true
            targets: mips64_mips64r2,mips64_octeonplus
          - id: mips64le
            goarch: mips64le
            gomips: softfloat
            upx_skip: true
            targets: mips64el_mips64r2
          - id: "386"
            goarch: "386"
            targets: i386_pentium-mmx,i386_pentium4
          - id: amd64
            goarch: amd64
            cgo: "1"
            cc: musl-gcc
            setup: "sudo apt-get update && sudo apt-get install -y musl-tools"
            targets: x86_64
          - id: geode
            goarch: "386"
            go386: softfloat
            targets: i386_geode
    name: "bin-${{ matrix.id }}"
    steps:
      - name: "环境准备"
        if: matrix.setup
        run: ${{ matrix.setup }}

      - uses: actions/checkout@v4
        with:
          path: main

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.TAILSCALE_REPO }}
          ref: ${{ needs.check-version.outputs.version }}
          path: src

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: src/go.sum

      - name: "恢复 UPX 缓存"
        if: env.ENABLE_COMPRESSION == 'true' && !matrix.upx_skip
        uses: actions/cache/restore@v4
        with:
          path: /tmp/upx/upx
          key: upx-${{ needs.setup-upx.outputs.upx_version }}-amd64-linux
          fail-on-cache-miss: true

      - name: "编译"
        working-directory: src
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips || '' }}
          GO386: ${{ matrix.go386 || '' }}
          CGO_ENABLED: ${{ matrix.cgo || '0' }}
          CC: ${{ matrix.cc || '' }}
        run: |
          eval $(CGO_ENABLED=0 GOOS=$(go env GOHOSTOS) GOARCH=$(go env GOHOSTARCH) go run ./cmd/mkversion)
          mkdir -p ../build
          go build \
            -tags "ts_include_cli,ts_omit_aws,ts_omit_bird,ts_omit_tap,ts_omit_kube,ts_omit_completion,ts_omit_ssh,ts_omit_wakeonlan,ts_omit_capture,ts_omit_relayserver,ts_omit_systray,ts_omit_taildrop,ts_omit_tpm,ts_omit_syspolicy,ts_omit_debugeventbus,ts_omit_webclient" \
            -ldflags "-X tailscale.com/version.longStamp=${VERSION_LONG} -X tailscale.com/version.shortStamp=${VERSION_SHORT} -s -w" \
            -trimpath -o "../build/tailscaled-linux-${{ matrix.id }}" ./cmd/tailscaled

      - name: "压缩"
        if: env.ENABLE_COMPRESSION == 'true' && !matrix.upx_skip
        run: /tmp/upx/upx --lzma --best "build/tailscaled-linux-${{ matrix.id }}" || true

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.id }}
          path: build/tailscaled-linux-${{ matrix.id }}
          if-no-files-found: error
          retention-days: 1

  build-apk:
    needs: [check-version, build-tailscale]
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: arm
            sdk_arch: arm_cortex-a7_neon-vfpv4
            targets: arm_arm1176jzf-s_vfp,arm_arm926ej-s,arm_cortex-a15_neon-vfpv4,arm_cortex-a5_vfpv4,arm_cortex-a7,arm_cortex-a7_neon-vfpv4,arm_cortex-a7_vfpv4,arm_cortex-a8_vfpv3,arm_cortex-a9,arm_cortex-a9_neon,arm_cortex-a9_vfpv3-d16,arm_fa526,arm_xscale,arm_mpcore
          - id: arm64
            sdk_arch: aarch64_cortex-a53
            targets: aarch64_cortex-a53,aarch64_cortex-a72,aarch64_cortex-a76,aarch64_generic
          - id: mips
            sdk_arch: mips_24kc
            targets: mips_24kc,mips_4kec,mips_mips32
          - id: mipsle
            sdk_arch: mipsel_24kc
            targets: mipsel_24kc,mipsel_24kc_24kf,mipsel_74kc,mipsel_mips32
          - id: mips64
            sdk_arch: mips64_mips64r2
            targets: mips64_mips64r2,mips64_octeonplus
          - id: mips64le
            sdk_arch: mips64el_mips64r2
            targets: mips64el_mips64r2
          - id: "386"
            sdk_arch: i386_pentium4
            targets: i386_pentium-mmx,i386_pentium4
          - id: amd64
            sdk_arch: x86_64
            targets: x86_64
          - id: geode
            sdk_arch: i386_pentium4
            targets: i386_geode
    name: "apk-${{ matrix.id }}"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bin-${{ matrix.id }}
          path: bin/

      - name: "准备 Makefile 和二进制"
        run: |
          VERSION=$(echo "${{ needs.check-version.outputs.version }}" | sed 's/^v//')
          chmod +x bin/tailscaled-linux-${{ matrix.id }}
          cp bin/tailscaled-linux-${{ matrix.id }} tailscale/files/tailscaled
          cat > tailscale/Makefile <<EOF
          include \$(TOPDIR)/rules.mk
          PKG_NAME:=tailscale
          PKG_VERSION:=${VERSION}
          PKG_RELEASE:=1
          PKG_FLAGS:=nonshared
          include \$(INCLUDE_DIR)/package.mk

          define Package/tailscale
            SECTION:=net
            CATEGORY:=Network
            TITLE:=Zero config VPN
            URL:=https://tailscale.com
            DEPENDS:=+ca-bundle +kmod-tun
            PROVIDES:=tailscaled
          endef

          define Package/tailscale/conffiles
          /etc/config/tailscale
          /etc/tailscale/
          endef

          define Build/Compile
          endef

          define Package/tailscale/install
            \$(INSTALL_DIR) \$(1)/usr/sbin \$(1)/etc/init.d \$(1)/etc/config
            \$(INSTALL_BIN) \$(CURDIR)/files/tailscaled \$(1)/usr/sbin/tailscaled
            \$(LN) tailscaled \$(1)/usr/sbin/tailscale
            \$(INSTALL_BIN) \$(CURDIR)/files/tailscale.init \$(1)/etc/init.d/tailscale
            \$(INSTALL_DATA) \$(CURDIR)/files/tailscale.conf \$(1)/etc/config/tailscale
            \$(INSTALL_BIN) \$(CURDIR)/files/tailscale_helper \$(1)/usr/sbin/
          endef

          \$(eval \$(call BuildPackage,tailscale))
          EOF

      - name: "SDK 打包"
        uses: sbwml/openwrt-gh-action-sdk@go1.25
        env:
          ARCH: ${{ matrix.sdk_arch }}-SNAPSHOT
          FEEDNAME: packages_ci
          PACKAGES: tailscale
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: true

      - name: "收集并重命名"
        run: |
          VERSION=$(echo "${{ needs.check-version.outputs.version }}" | sed 's/^v//')
          mkdir -p output
          BASE=$(find bin/packages -name "tailscale_*.apk" | head -1)
          [ -z "$BASE" ] && echo "没找到 apk" && exit 1
          # targets 字段以逗号分隔，直接 split 即可，无需 jq
          IFS=',' read -ra TARGETS <<< "${{ matrix.targets }}"
          for ARCH in "${TARGETS[@]}"; do
            cp "$BASE" "output/tailscale-${VERSION}-r1.${ARCH}.apk"
          done
          ls -la output/

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.id }}
          path: output/*.apk
          if-no-files-found: error
          retention-days: 7

  build-luci:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { sdk: SNAPSHOT,      pkg_type: apk }
          - { sdk: openwrt-24.10, pkg_type: ipk }
    name: "luci-${{ matrix.pkg_type }}"
    steps:
      - uses: actions/checkout@v4

      - name: "准备"
        run: |
          rm -rf tailscale/
          sed -i 's/+tailscale//g' luci-app-tailscale/Makefile

      - uses: sbwml/openwrt-gh-action-sdk@go1.25
        env:
          ARCH: x86_64-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-tailscale
          NO_REFRESH_CHECK: true

      - name: "收集"
        run: |
          mkdir -p output
          find bin/packages -name "*luci*tailscale*.${{ matrix.pkg_type }}" -exec cp {} output/ \;
          [ -n "$(ls -A output/)" ] || exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: luci-${{ matrix.pkg_type }}
          path: output/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [check-version, build-apk, build-luci]
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
          pattern: "{apk-*,luci-*}"

      - name: "整理"
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.apk" -o -name "*.ipk" \) -exec cp {} release/ \;
          [ -n "$(ls -A release/)" ] || exit 1

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check-version.outputs.version }}
          name: "Tailscale ${{ needs.check-version.outputs.version }} + LuCI ${{ needs.check-version.outputs.luci_version }}"
          body: |
            | 组件 | 版本 |
            |------|------|
            | Tailscale | ${{ needs.check-version.outputs.version }} |
            | LuCI | ${{ needs.check-version.outputs.luci_version }} |
            | 构建时间 | ${{ needs.check-version.outputs.build_time }} CST |
            | UPX 压缩 | ${{ env.ENABLE_COMPRESSION == 'true' && '✅' || '❌' }} |

            📖 **安装说明请查看 [README](https://github.com/${{ github.repository }}#readme)**
          artifacts: "release/*"
          token: ${{ secrets.GITHUB_TOKEN }}

  report:
    needs: [check-version, build-apk, build-luci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "报告"
        run: |
          if [ "${{ needs.check-version.outputs.skip }}" = "true" ]; then
            echo "# ⏭️ 跳过（版本相同: ${{ needs.check-version.outputs.version }}）" >> $GITHUB_STEP_SUMMARY
          else
            cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🎯 构建报告
          | 组件 | 版本 | 状态 |
          |------|------|------|
          | Tailscale | ${{ needs.check-version.outputs.version }} | ${{ needs.build-apk.result == 'success' && '✅' || '❌' }} |
          | LuCI | ${{ needs.check-version.outputs.luci_version }} | ${{ needs.build-luci.result == 'success' && '✅' || '❌' }} |

          **时间:** ${{ needs.check-version.outputs.build_time }} CST | **压缩:** ${{ env.ENABLE_COMPRESSION == 'true' && '✅' || '❌' }}
          EOF
          fi
