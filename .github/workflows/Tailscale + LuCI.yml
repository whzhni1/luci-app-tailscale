name: "构建 Tailscale + LuCI"

on:
  workflow_dispatch:
    inputs:
      enable_compression:
        description: '启用 UPX 压缩'
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tailscale.outputs.version }}
      skip: ${{ steps.tailscale.outputs.skip }}
      luci_version: ${{ steps.luci.outputs.version }}
      build_time: ${{ steps.time.outputs.time }}
    steps:
      - uses: actions/checkout@v4

      - name: "检查 Tailscale 更新"
        id: tailscale
        run: |
          LATEST=$(curl -s https://api.github.com/repos/tailscale/tailscale/releases/latest \
            | jq -r .tag_name | sed 's/^v//')
          CURRENT=$(sed -n 's/^PKG_VERSION:=//p' tailscale/Makefile)
          echo "version=v$LATEST" >> $GITHUB_OUTPUT
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            HASH=$(curl -sL "https://codeload.github.com/tailscale/tailscale/tar.gz/v${LATEST}" \
              | sha256sum | cut -d' ' -f1)
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$LATEST/; s/^PKG_HASH:=.*/PKG_HASH:=$HASH/" tailscale/Makefile
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "tailscale: update to $LATEST" || true
            git push || true
          fi

      - name: "获取 LuCI 版本"
        id: luci
        run: |
          echo "version=$(grep -E '^PKG_VERSION:=' luci-app-tailscale/Makefile | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: "生成构建时间"
        id: time
        run: echo "time=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

  build-tailscale:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    name: "tailscale-${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - arm_arm1176jzf-s_vfp
          - arm_arm926ej-s
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a7_vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - arm_xscale
          - arm_mpcore
          - i386_geode
          - i386_pentium-mmx
          - i386_pentium4
          - mips_24kc
          - mips_4kec
          - mips_mips32
          - mipsel_24kc
          - mipsel_24kc_24kf
          - mipsel_74kc
          - mipsel_mips32
          - mips64_mips64r2
          - mips64_octeonplus
          - mips64el_mips64r2
          - x86_64
    steps:
      - uses: actions/checkout@v4

      - name: "注入 UPX"
        if: >
          (github.event_name == 'schedule' || inputs.enable_compression == true) &&
          !contains('mips64_mips64r2 mips64_octeonplus mips64el_mips64r2', matrix.arch)
        run: |
          sed -i '/tailscale.init/a \\t/usr/bin/upx --lzma --best $(1)\/usr\/sbin\/tailscaled || true' tailscale/Makefile

      - uses: sbwml/openwrt-gh-action-sdk@go1.25
        env:
          ARCH: ${{ matrix.arch }}-SNAPSHOT
          FEEDNAME: packages_ci
          PACKAGES: tailscale
          NO_REFRESH_CHECK: true

      - name: "打包上传"
        run: |
          tar -zcf SNAPSHOT-${{ matrix.arch }}-tailscale.tar.gz \
            -C bin/packages/${{ matrix.arch }}/ packages_ci

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check-version.outputs.version }}
          name: "Tailscale ${{ needs.check-version.outputs.version }} + LuCI ${{ needs.check-version.outputs.luci_version }}"
          body: |
            | 组件 | 版本 |
            |------|------|
            | Tailscale | ${{ needs.check-version.outputs.version }} |
            | LuCI | ${{ needs.check-version.outputs.luci_version }} |
            | 构建时间 | ${{ needs.check-version.outputs.build_time }} CST |

            📖 **安装说明请查看 [README](https://github.com/${{ github.repository }}#readme)**
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "SNAPSHOT-${{ matrix.arch }}-tailscale.tar.gz"

  build-luci:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    name: "luci-${{ matrix.sdk }}"
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - SNAPSHOT
          - openwrt-24.10
    steps:
      - uses: actions/checkout@v4

      - name: "准备"
        run: |
          rm -rf tailscale/
          sed -i 's/+tailscale//g' luci-app-tailscale/Makefile

      - uses: sbwml/openwrt-gh-action-sdk@go1.25
        env:
          ARCH: x86_64-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-tailscale
          NO_REFRESH_CHECK: true

      - name: "打包上传"
        run: |
          tar -zcf ${{ matrix.sdk }}-luci.tar.gz \
            -C bin/packages/x86_64/ packages_ci

      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check-version.outputs.version }}
          name: "Tailscale ${{ needs.check-version.outputs.version }} + LuCI ${{ needs.check-version.outputs.luci_version }}"
          body: |
            | 组件 | 版本 |
            |------|------|
            | Tailscale | ${{ needs.check-version.outputs.version }} |
            | LuCI | ${{ needs.check-version.outputs.luci_version }} |
            | 构建时间 | ${{ needs.check-version.outputs.build_time }} CST |

            📖 **安装说明请查看 [README](https://github.com/${{ github.repository }}#readme)**
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "${{ matrix.sdk }}-luci.tar.gz"

  report:
    needs: [check-version, build-tailscale, build-luci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "报告"
        run: |
          if [ "${{ needs.check-version.outputs.skip }}" = "true" ]; then
            echo "# ⏭️ 跳过（版本相同: ${{ needs.check-version.outputs.version }}）" >> $GITHUB_STEP_SUMMARY
          else
            cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🎯 构建报告
          | 组件 | 版本 | 状态 |
          |------|------|------|
          | Tailscale | ${{ needs.check-version.outputs.version }} | ${{ needs.build-tailscale.result == 'success' && '✅' || '❌' }} |
          | LuCI | ${{ needs.check-version.outputs.luci_version }} | ${{ needs.build-luci.result == 'success' && '✅' || '❌' }} |

          **时间:** ${{ needs.check-version.outputs.build_time }} CST
          EOF
          fi
